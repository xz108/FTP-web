[server]
# FTP 根目录（默认：当前目录下的 FTP-Share）
root_dir = FTP-Share
# 监听地址，0.0.0.0 表示监听所有网卡
listen_host = 0.0.0.0
# 监听端口（默认 2121）
listen_port = 2121
# 被动模式端口范围
pasv_min_port = 2122
pasv_max_port = 2150
# 本机局域网IP：auto 表示自动获取，也可手动填写
lan_ip = auto
# 最大连接数
max_cons = 50
# 单IP最大连接数
max_cons_per_ip = 5
# 超时时间（秒）
idle_timeout = 300

[anonymous]
# 是否允许匿名登录
enable = true
# 匿名权限：
# e=更改目录 l=列目录 r=读取 a=追加 d=删除 f=重命名 m=创建目录 w=写入 M=修改时间 T=修改时间(精确)
perm = elradfmwMT

[users]
# 可在这里添加多个用户，格式：
# 用户名 = 密码, 权限, 目录(可选)
# 目录默认使用 root_dir
# 例如：
# alice = 123456, elradfmwMT, FTP-Share
# bob = passw0rd, elr, FTP-Share

# 是否启用 users.ini（如有更复杂的用户配置）
users_file = users.ini

[web]
# 是否启用 Web 管理页面
enable = true
# Web 监听地址
host = 0.0.0.0
# Web 监听端口
port = 8080
# Web 管理登录账号（Basic Auth）
username = admin
# Web 管理登录密码（Basic Auth）
password = admin
